server {
    listen 80 default_server;

    set $upstream http://account:8080;
    location / {
        proxy_pass $upstream;
        proxy_set_header Host account.pretendo.cc;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
